<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="storepage.css">
  <link rel="stylesheet" href="homepage.css">
  <link rel="stylesheet" href="login.css">

  <meta charset="UTF-8">
  <title>Chamali Apple Store - Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="top">
  <a href="/" class="logo">Chamali Apple Store</a>
</div>

<div class="login-wrapper">
  <h1 class="cart-title" style="text-align: center;">Sign in for checkout.</h1>

  <form id="loginForm">
    <input type="email" id="loginEmail" placeholder="Apple ID (Email)" required>
    <input type="password" id="loginPassword" placeholder="Password" required>

    <button type="submit" class="checkout-btn">Sign In</button>
  </form>

  <div class="login-footer">
    <hr style="border: 0; border-top: 1px solid #d2d2d7; margin: 20px 0;">
    <p>Don't have an Apple ID? <a href="register.html" style="color: #0071e3; text-decoration: none;">Create yours now.</a></p>
  </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
